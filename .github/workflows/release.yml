name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re-)upload artifacts to. Leave blank to skip upload and brew/scoop updates."
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    if: github.event_name == 'workflow_dispatch' || !github.event.release.prerelease
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: aarch64-macos
            runner: macos-14
            target: aarch64-apple-darwin
            bottle_tag: arm64_sonoma
            archive: tar.gz
          - name: x86_64-linux
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bottle_tag: x86_64_linux
            archive: tar.gz
          - name: aarch64-linux
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - name: x86_64-windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install LLVM 18 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@18
          echo "LLVM_SYS_181_PREFIX=$(brew --prefix llvm@18)" >> "$GITHUB_ENV"

      - name: Install LLVM 18 (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          UBUNTU_CODENAME=$(lsb_release -cs)
          echo "deb https://apt.llvm.org/${UBUNTU_CODENAME}/ llvm-toolchain-${UBUNTU_CODENAME}-18 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-18-dev libllvm18 clang-18 libclang-18-dev libpolly-18-dev
          echo "LLVM_SYS_181_PREFIX=/usr/lib/llvm-18" >> "$GITHUB_ENV"

      - name: Install LLVM 18 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://github.com/c3lang/win-llvm/releases/download/llvm_18_1_8_with_rt/llvm-18.1.8-windows-amd64-msvc17-msvcrt.7z"
          curl.exe -sL -o llvm.7z $url
          7z x llvm.7z -oC:\LLVM | Out-Null
          $prefix = (Get-ChildItem C:\LLVM -Directory | Select-Object -First 1).FullName
          "LLVM_SYS_181_PREFIX=$prefix" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Get version
        id: version
        shell: bash
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package binary (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../bruto-pascal-${{ (inputs.tag || github.ref_name) }}-${{ matrix.name }}.tar.gz brutop
          cd ../../..

      - name: Package binary (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/brutop.exe -DestinationPath bruto-pascal-${{ (inputs.tag || github.ref_name) }}-${{ matrix.name }}.zip

      - name: Upload binary archive
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload ${{ (inputs.tag || github.ref_name) }} bruto-pascal-${{ (inputs.tag || github.ref_name) }}-${{ matrix.name }}.${{ matrix.archive }} --clobber

      # --- Homebrew bottle (only for platforms with bottle_tag) ---

      - name: Package Homebrew bottle
        if: matrix.bottle_tag && (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.tag != ''))
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BOTTLE_TAG="${{ matrix.bottle_tag }}"
          mkdir -p bruto-pascal/${VERSION}/bin
          cp target/${{ matrix.target }}/release/brutop bruto-pascal/${VERSION}/bin/brutop
          chmod +x bruto-pascal/${VERSION}/bin/brutop
          tar czf "bruto-pascal-${VERSION}.${BOTTLE_TAG}.bottle.tar.gz" bruto-pascal/

      - name: Upload bottle artifact
        if: matrix.bottle_tag && (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.tag != ''))
        uses: actions/upload-artifact@v4
        with:
          name: bottle-${{ matrix.bottle_tag }}
          path: "bruto-pascal-*.bottle.tar.gz"

  update-homebrew:
    name: Update Homebrew tap
    if: (github.event_name == 'release' && !github.event.release.prerelease) || (github.event_name == 'workflow_dispatch' && inputs.tag != '') && !cancelled()
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download bottle artifacts
        uses: actions/download-artifact@v4
        with:
          path: bottles
          merge-multiple: true

      - name: Upload bottles to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          for f in bottles/bruto-pascal-*.bottle.tar.gz; do
            gh release upload "$TAG" "$f" --clobber
          done

      - name: Download source tarball
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          curl -sL "https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz" -o "source.tar.gz"

      - name: Compute SHA256 hashes
        id: hashes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SOURCE_SHA=$(sha256sum source.tar.gz | awk '{print $1}')
          echo "source_sha=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"

          for f in bottles/bruto-pascal-*.bottle.tar.gz; do
            tag=$(basename "$f" | sed "s/bruto-pascal-${VERSION}\.\(.*\)\.bottle\.tar\.gz/\1/")
            sha=$(sha256sum "$f" | awk '{print $1}')
            echo "${tag}_sha=${sha}" >> "$GITHUB_OUTPUT"
          done

      - name: Update formula
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SOURCE_SHA="${{ steps.hashes.outputs.source_sha }}"
          ARM64_SONOMA_SHA="${{ steps.hashes.outputs.arm64_sonoma_sha }}"
          X86_64_LINUX_SHA="${{ steps.hashes.outputs.x86_64_linux_sha }}"

          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/aovestdipaperino/homebrew-tap.git" tap

          cat > tap/Formula/bruto-pascal.rb << EOF
          class BrutoPascal < Formula
            desc "TUI-based Mini-Pascal IDE with LLVM-backed compiler and lldb debugger"
            homepage "https://github.com/aovestdipaperino/bruto-pascal"
            url "https://github.com/aovestdipaperino/bruto-pascal/archive/refs/tags/v${VERSION}.tar.gz"
            sha256 "${SOURCE_SHA}"
            license "MIT"

            bottle do
              root_url "https://github.com/aovestdipaperino/bruto-pascal/releases/download/v${VERSION}"
              sha256 cellar: :any_skip_relocation, arm64_sonoma: "${ARM64_SONOMA_SHA}"
              sha256 cellar: :any_skip_relocation, x86_64_linux: "${X86_64_LINUX_SHA}"
            end

            depends_on "llvm@18"
            depends_on "rust" => :build

            def install
              ENV["LLVM_SYS_181_PREFIX"] = Formula["llvm@18"].opt_prefix
              system "cargo", "install", *std_cargo_args
            end

            test do
              system "#{bin}/brutop", "--help"
            end
          end
          EOF

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/bruto-pascal.rb
          git diff --cached --quiet || git commit -m "bruto-pascal ${VERSION}"
          git push

  update-scoop:
    name: Update Scoop bucket
    if: (github.event_name == 'release' && !github.event.release.prerelease) || (github.event_name == 'workflow_dispatch' && inputs.tag != '') && !cancelled()
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          gh release download "${TAG}" \
            --repo "${{ github.repository }}" \
            --pattern "bruto-pascal-${TAG}-x86_64-windows.zip" \
            --dir .
          SHA256=$(sha256sum "bruto-pascal-${TAG}-x86_64-windows.zip" | cut -d' ' -f1)
          echo "sha256_win64=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Update Scoop manifest
        env:
          SCOOP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          TAG="${{ steps.release.outputs.tag }}"
          SHA256="${{ steps.release.outputs.sha256_win64 }}"

          cat > brutop.json << EOF
          {
            "version": "${VERSION}",
            "description": "TUI-based Mini-Pascal IDE with LLVM-backed compiler and lldb debugger",
            "homepage": "https://github.com/aovestdipaperino/bruto-pascal",
            "license": "MIT",
            "architecture": {
              "64bit": {
                "url": "https://github.com/aovestdipaperino/bruto-pascal/releases/download/${TAG}/bruto-pascal-${TAG}-x86_64-windows.zip",
                "hash": "${SHA256}"
              }
            },
            "bin": "brutop.exe",
            "checkver": {
              "github": "https://github.com/aovestdipaperino/bruto-pascal"
            },
            "autoupdate": {
              "architecture": {
                "64bit": {
                  "url": "https://github.com/aovestdipaperino/bruto-pascal/releases/download/v\$version/bruto-pascal-v\$version-x86_64-windows.zip"
                }
              }
            }
          }
          EOF

          git clone "https://x-access-token:${SCOOP_GITHUB_TOKEN}@github.com/aovestdipaperino/scoop-tokensave.git" scoop-repo
          cd scoop-repo
          mkdir -p bucket
          cp ../brutop.json bucket/brutop.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/brutop.json
          git diff --cached --quiet || git commit -m "brutop ${VERSION}"
          git push
