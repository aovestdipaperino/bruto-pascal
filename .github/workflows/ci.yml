name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            runner: macos-14
          - name: Linux
            runner: ubuntu-latest

    # Windows is deliberately omitted: official LLVM binaries on Windows
    # ship without llvm-config.exe, which llvm-sys requires. Adding
    # Windows back means either building LLVM from source on the runner
    # or sourcing a community prebuilt that includes llvm-config. The
    # codegen already has the MSVC path (Stdio enum, clang linker) so
    # the only thing missing once LLVM is sorted is the matrix entry.

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install LLVM 18 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@18
          echo "LLVM_SYS_181_PREFIX=$(brew --prefix llvm@18)" >> "$GITHUB_ENV"

      - name: Install LLVM 18 (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          UBUNTU_CODENAME=$(lsb_release -cs)
          echo "deb https://apt.llvm.org/${UBUNTU_CODENAME}/ llvm-toolchain-${UBUNTU_CODENAME}-18 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-18-dev libllvm18 clang-18 libclang-18-dev libpolly-18-dev
          echo "LLVM_SYS_181_PREFIX=/usr/lib/llvm-18" >> "$GITHUB_ENV"

      - name: Run tests
        # --tests --lib limits cargo's compile set to library + integration
        # tests; without it, turbo-vision-4-rust's `ssh_server` example
        # gets compiled, which requires the `ssh` feature to be enabled.
        # --exclude turbo-vision skips upstream tests in the vendored
        # turbo-vision fork — it has 3 pre-existing test failures in
        # views::group that are out of scope for this repo.
        # --test-threads=1 — several debugger tests share /tmp paths and
        # collide under cargo's default parallel runner.
        run: cargo test --workspace --exclude turbo-vision --tests --lib -- --test-threads=1

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      # Scope to our own crates — turbo-vision-4-rust has unformatted
      # example files that we don't own.
      - run: cargo fmt -p bruto-pascal -p bruto-ide -p bruto-lang -p bruto-pascal-lang -- --check
